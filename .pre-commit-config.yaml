---
repos:
  # Go: mod tidy, build, test
  - repo: https://github.com/tekwizely/pre-commit-golang
    rev: v1.0.0-rc.4
    hooks:
      - id: go-mod-tidy
      - id: go-build-mod

  # Local: format -> lint -> vet
  - repo: local
    hooks:
      - id: make-check
        name: make check (format, lint, vet)
        entry: make
        args: [check]
        language: system
        pass_filenames: false
        always_run: true

  # Preprocessing & Code Hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: mixed-line-ending
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: detect-private-key
        exclude: "^docs/"

  # Security & Secret Scanning
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks
        args: [--verbose]
